name: stats

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch telemetry stats
        run: |
          set -euo pipefail
          echo "--- $(date '+%Y-%m-%d %H:%M:%S') ---"
          curl -sf https://store-nvim-telemetry.alex-popov-tech.workers.dev/stats | jq .
